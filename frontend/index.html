<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebScanPro Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: #e2e8f0;
}

/* HEADER */
header {
    padding: 25px;
    text-align: center;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

header h1 {
    margin: 0;
    font-size: 34px;
    background: linear-gradient(90deg, #38bdf8, #22c55e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

header p {
    color: #94a3b8;
}

/* BUTTONS */
.controls {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 30px;
}

button {
    padding: 14px 28px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    transition: all 0.3s ease;
}

.run-btn {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
}

.run-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 15px #22c55e;
}

.report-btn {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
}

.report-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 15px #3b82f6;
}

/* LOADER */
.loader {
    display: none;
    text-align: center;
    font-size: 18px;
    color: #38bdf8;
    margin-top: 10px;
}

/* SUMMARY */
.summary {
    display: flex;
    justify-content: center;
    gap: 25px;
    margin: 30px;
    flex-wrap: wrap;
}

.card {
    padding: 25px;
    border-radius: 15px;
    width: 220px;
    text-align: center;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px) scale(1.03);
}

.card h2 {
    font-size: 32px;
    margin: 10px 0;
}

/* COLORS */
.sqli { border-left: 5px solid #ef4444; }
.xss { border-left: 5px solid #f59e0b; }
.access { border-left: 5px solid #3b82f6; }

/* RESULTS */
.results {
    margin: 20px auto;
    max-width: 900px;
}

.vuln-card {
    background: rgba(255,255,255,0.04);
    padding: 18px;
    margin: 15px 0;
    border-radius: 12px;
    border-left: 5px solid #38bdf8;
    transition: 0.3s;
}

.vuln-card:hover {
    background: rgba(255,255,255,0.08);
    transform: scale(1.01);
}

.vuln-card h3 {
    margin: 0 0 10px 0;
    color: #38bdf8;
}

.vuln-card p {
    margin: 4px 0;
    color: #cbd5f5;
}

/* TAGS */
.tag {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 12px;
    margin-top: 5px;
}

.high { background: #ef4444; }
.medium { background: #f59e0b; }
.low { background: #3b82f6; }

</style>

</head>

<body>

<header>
    <h1>🛡️ WebScanPro</h1>
    <p>Advanced Web Vulnerability Scanner</p>
</header>

<div class="controls">
    <button class="run-btn" onclick="runScan()">🚀 Run Scan</button>
    <button class="report-btn" onclick="loadReport()">📊 Load Report</button>
</div>

<div class="loader" id="loader">⚡ Scanning in progress...</div>

<div class="summary">
    <div class="card sqli">
        <h2 id="sqliCount">0</h2>
        <p>SQL Injection</p>
    </div>
    <div class="card xss">
        <h2 id="xssCount">0</h2>
        <p>XSS</p>
    </div>
    <div class="card access">
        <h2 id="accessCount">0</h2>
        <p>Access Control</p>
    </div>
</div>

<div class="results" id="results"></div>

<script>

async function runScan() {
    document.getElementById("loader").style.display = "block";

    await fetch("http://127.0.0.1:8000/scan");

    document.getElementById("loader").style.display = "none";
    alert("✅ Scan Completed!");
}

async function loadReport() {

    let res = await fetch("http://127.0.0.1:8000/report");
    let data = await res.json();

    let resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    let sqli = 0, xss = 0, access = 0;

    let details = data.details;

    for (let category in details) {

        let vulns = details[category];

        vulns.forEach(v => {

            let severity = "low";

            if (category.includes("SQL")) { sqli++; severity = "high"; }
            else if (category.includes("XSS")) { xss++; severity = "medium"; }
            else { access++; severity = "low"; }

            let card = document.createElement("div");
            card.className = "vuln-card";

            card.innerHTML = `
                <h3>${category}</h3>
                <p><b>URL:</b> ${v.url || "-"}</p>
                <p><b>Payload:</b> ${v.payload || "-"}</p>
                <p><b>Method:</b> ${v.method || "-"}</p>
                <p><b>Input:</b> ${v.vulnerable_input || "-"}</p>
                <p><b>Fix:</b> ${v.remediation || "-"}</p>
                <span class="tag ${severity}">${severity.toUpperCase()}</span>
            `;

            resultsDiv.appendChild(card);
        });
    }

    document.getElementById("sqliCount").innerText = sqli;
    document.getElementById("xssCount").innerText = xss;
    document.getElementById("accessCount").innerText = access;
}

</script>

</body>
</html>
